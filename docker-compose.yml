services:
  db:
    image: postgres:16
    container_name: nanominion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nanominion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nanominion_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
